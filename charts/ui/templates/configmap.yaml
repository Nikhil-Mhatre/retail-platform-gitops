###############################################################################
# ConfigMap
#
# Stores non-sensitive application configuration.
#
# These values are consumed by the Deployment using explicit
# configMapKeyRef entries.
###############################################################################

apiVersion: v1
kind: ConfigMap

metadata:

  ###########################################################################
  # Resource Name
  ###########################################################################
  name: {{ include "ui.fullname" . }}-config

  ###########################################################################
  # Common Labels
  ###########################################################################
  labels: {{ include "ui.labels" . | nindent 4 }}

data:

  ###########################################################################
  # Spring Profile
  ###########################################################################
  SPRING_PROFILES_ACTIVE: {{ .Values.config.springProfile | quote }}

  ###########################################################################
  # Application Name
  ###########################################################################
  SPRING_APPLICATION_NAME: {{ .Values.config.applicationName | quote }}

  ###########################################################################
  # Logging Level
  ###########################################################################
  LOGGING_LEVEL_ROOT: {{ .Values.config.loggingLevel | quote }}

  ###########################################################################
  # Feature Flag
  ###########################################################################
  FEATURE_X_ENABLED: {{ .Values.config.featureXEnabled | quote }}