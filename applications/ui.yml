apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ui
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Nikhil-Mhatre/retail-platform-gitops.git
    targetRevision: main
    path: charts/ui

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
